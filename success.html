<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Purushottam Acharya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" type="module"></script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .success-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .success-icon {
      font-size: 3rem;
      color: var(--accent);
      margin-bottom: 2rem;
      opacity: 0;
      transform: scale(0.5);
      animation: popIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .success-title {
      font-size: 2.5rem;
      font-weight: 400;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.3s;
    }
    .success-msg {
      color: var(--muted);
      font-size: 1.1rem;
      max-width: 400px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.5s;
    }
    .back-link {
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.7s;
    }
    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="success-container">
    <div class="success-icon">
      <i class="ph ph-check-circle"></i>
    </div>
    <h1 class="success-title">Message <span class="accent-text">Received</span></h1>
    <p class="success-msg">
      Thanks for reaching out! I will respond to you in a beautiful way shortly.
    </p>
    <div class="back-link">
      <a href="index.html" class="btn btn-text"><i class="ph ph-arrow-left"></i> Back to Portfolio</a>
    </div>
  </main>
</body>
</html>
